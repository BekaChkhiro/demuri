name = "demuri"
compatibility_date = "2024-11-01"
# Required by SvelteKit's Cloudflare adapter (uses node:async_hooks et al.)
compatibility_flags = ["nodejs_compat"]

# R2 bucket for uploaded photo blobs (T1.2)
[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "demuri-photos"

# D1 database for photo metadata (T1.3)
[[d1_databases]]
binding = "DB"
database_name = "demuri"
database_id = "6bfd4eba-e36b-43ae-91d8-3ecb4b90814a"

# GALLERY Durable Object — the single live-gallery WebSocket hub (T3.1).
# Class implemented in src/lib/server/GalleryRoom.ts, typed in src/app.d.ts.
[[durable_objects.bindings]]
name = "GALLERY"
class_name = "GalleryRoom"

# Hibernatable WebSocket DOs require the SQLite-backed storage classes,
# declared via a new_sqlite_classes migration.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GalleryRoom"]

# Non-secret production variables.
# ADMIN_PASSWORD is a secret — set via: wrangler secret put ADMIN_PASSWORD
[vars]
R2_PUBLIC_BASE_URL = "https://pub-56b924963d704c6c8db69d15dc4caf78.r2.dev"
